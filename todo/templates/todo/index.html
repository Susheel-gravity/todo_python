<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Django Task Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow border-0">
                    <div class="card-header bg-primary text-white py-3 d-flex justify-content-between align-items-center">
                        <h4 class="mb-0">My To-Do List</h4>
                        <form method="POST" action="{% url 'logout' %}" class="mb-0">
                            {% csrf_token %}
                            <button type="submit" class="btn btn-sm btn-outline-light">Logout</button>
                        </form>
                    </div>
                    <div class="card-body bg-white">
                        <form method="POST" class="d-flex mb-4">
                            {% csrf_token %}
                            <input type="text" name="title" class="form-control me-2" placeholder="Naya task likhein..." required>
                            <button type="submit" class="btn btn-primary shadow-sm">
                                <i class="bi bi-plus-lg"></i> Add
                            </button>
                        </form>

                        <ul class="list-group list-group-flush">
                            {% for task in tasks %}
                            <li class="list-group-item d-flex justify-content-between align-items-center border-start-0 border-end-0 px-0">
                                <span class="{% if task.completed %}text-decoration-line-through text-muted{% endif %}">
                                    {{ task.title }}
                                </span>
                                
                                <div class="d-flex align-items-center">
                                    <a href="{% url 'toggle_task' task.id %}" class="text-decoration-none">
                                        {% if task.completed %}
                                            <span class="badge bg-success-soft text-success border border-success me-2 px-2">Done ✅</span>
                                        {% else %}
                                            <span class="badge bg-warning-soft text-warning border border-warning me-2 px-2">Pending ❌</span>
                                        {% endif %}
                                    </a>
                                    
                                    <a href="{% url 'delete_task' task.id %}" class="btn btn-sm btn-outline-danger border-0">
                                        <i class="bi bi-trash"></i>
                                    </a>
                                </div>
                            </li>
                            {% empty %}
                            <li class="list-group-item text-center text-muted py-4">
                                <p class="mb-0">Abhi koi task nahi hai! Shuruat kijiye...</p>
                            </li>
                            {% endfor %}
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
